idth:34px;height:34px;border:1px solid #ffffff30;border-radius:10px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;margin-top:20px}.item{padding:15px;border-radius:22px}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.head h3{margin:0;font-size:18px}.head span,.label{color:#8fa5b6;font-size:9px;font-weight:900;letter-spacing:1.4px;text-transform:uppercase}.pair{display:grid;gap:14px}.label{margin:0 0 7px}.card{position:relative;overflow:hidden;aspect-ratio:1.75/1;border-radius:18px;background:#fff;color:#07131c;box-shadow:0 18px 42px #0005}.mark{position:absolute;width:23%;height:26%;left:7%;top:12%;z-index:3}.mark svg{width:100%;height:100%}.info{position:absolute;z-index:3}.name{font-size:15px;font-weight:900}.role{font-size:10px;letter-spacing:1px;text-transform:uppercase}.small{font-size:9px;line-height:1.7}.front .info{left:7%;bottom:13%}.front .contact{left:auto;right:6%;text-align:right}.back .mark{left:50%;top:36%;width:27%;height:30%;transform:translate(-50%,-50%)}.company,.tag,.web,.backcopy{position:absolute;left:8%;right:8%;text-align:center;z-index:3}.company{bottom:25%;font-weight:900;letter-spacing:2px}.tag{bottom:16%;font-size:9px;letter-spacing:1.3px;text-transform:uppercase}.web{bottom:8%;font-size:9px}.backcopy{bottom:9%;font-size:10px;line-height:1.55}.backlist{position:absolute;left:10%;right:10%;bottom:12%;z-index:3;font-size:9px;line-height:1.75}.backlist b{display:block;margin-bottom:5px;font-size:11px}.qr{position:absolute;width:24%;aspect-ratio:1;right:9%;bottom:12%;background:repeating-conic-gradient(#07131c 0 25%,#fff 0 50%) 0/12px 12px;border:7px solid #fff;box-shadow:0 0 0 1px #0002}.route{position:absolute;left:10%;right:10%;top:48%;height:2px;background:linear-gradient(90deg,var(--a),var(--b))}.route:before,.route:after{content:"";position:absolute;top:50%;width:12px;height:12px;border-radius:50%;background:currentColor;transform:translateY(-50%)}.route:before{left:0;color:var(--a)}.route:after{right:0;color:var(--b)}

</style></head><body><nav class="nav"><a href="index.html">First Batch</a><a class="on" href="cards.html">Second Batch</a></nav><main class="wrap"><section class="hero"><div class="brand"><svg class="logo" viewBox="0 0 420 320"><path class="x" d="M24 103 132 12h264l-75 58H158l-33 31 119 27-71 61z"/><path class="y" d="m296 126 82 18-194 164-41-45z"/></svg><div><strong>SAC LOGISTICS</strong><small>BUSINESS CARD DESIGN SYSTEM</small></div></div><div class="intro"><h1>Second Batch — 10 reviewed front-and-back concepts.</h1><p>Every back side now has a separate purpose and no longer repeats the personal information shown on the front.</p></div><div class="toolbar"><div class="control"><label>Choose theme</label><select id="theme"></select></div><div class="control"><label>Theme colors</label><div class="sw" id="sw"></div></div></div></section><section class="grid" id="grid"></section></main><script>
const T={industrial:['Industrial','#13c4e2','#c5df31','#061521'],royal:['Royal','#d4af37','#8ea6c4','#08111f'],desert:['Desert','#e5a73c','#70a17b','#2d241b'],ocean:['Ocean','#38d9ff','#1e88e5','#031b2f'],steel:['Steel','#ff6b35','#8da0ad','#1c242b'],emerald:['Emerald','#a3e635','#10b981','#06251d'],crimson:['Crimson','#ffcf33','#e5484d','#2a0b0d'],minimal:['Minimal','#111827','#9ca3af','#f6f7f8'],violet:['Violet','#facc15','#8b5cf6','#160b2d'],saudi:['Saudi','#d9b65f','#00843d','#05271b']};
const N=['Angular Split','Night Operations','Vertical Gradient','Executive Diagonal','Industrial Grid','Forward Motion','Minimal Corporate','Signal Frame','Soft Geometry','Dynamic Route'];
const logo='<svg viewBox="0 0 420 320"><path class="x" d="M24 103 132 12h264l-75 58H158l-33 31 119 27-71 61z"/><path class="y" d="m296 126 82 18-194 164-41-45z"/></svg>';
const backs=[
`<div class="mark">${logo}</div><div class="company">SAC LOGISTICS</div><div class="tag">Integrated Logistics Solutions</div><div class="web">www.sac-logistics.com</div>`,
`<div class="mark">${logo}</div><div class="backcopy">Moving equipment. Connecting operations.<br>Delivering across Saudi Arabia.</div>`,
`<div class="backlist"><b>Core Services</b>Equipment Supply<br>Road Transport<br>Warehouse Solutions<br>Operational Support</div>`,
`<div class="mark">${logo}</div><div class="qr"></div><div class="backlist" style="right:38%;bottom:18%"><b>Scan to connect</b>Company profile<br>Service request<br>Contact details</div>`,
`<div class="backlist"><b>Built for demanding operations</b>Construction & Infrastructure<br>Factories & Industrial Sites<br>Warehouses & Distribution<br>Ports & Container Yards</div>`,
`<div class="mark">${logo}</div><div class="route"></div><div class="backcopy">Request → Assessment → Sourcing → Scheduling → Delivery</div>`,
`<div class="mark">${logo}</div><div class="company">SAC LOGISTICS</div><div class="tag">Jeddah • Saudi Arabia</div><div class="web">Equipment • Transport • Support</div>`,
`<div class="backlist"><b>One partner. Clear responsibility.</b>Technical selection<br>Commercial comparison<br>Supply coordination<br>After-sales support</div>`,
`<div class="mark">${logo}</div><div class="backcopy">The right equipment.<br>The right specification.<br>The right delivery.</div>`,
`<div class="mark">${logo}</div><div class="route"></div><div class="tag" style="bottom:26%">Kingdom-wide logistics coverage</div><div class="web">sac-logistics.com</div>`
];
const sel=document.getElementById('theme'),g=document.getElementById('grid');Object.entries(T).forEach(([k,v])=>sel.insertAdjacentHTML('beforeend',`<option value="${k}">${v[0]}</option>`));for(let i=1;i<=10;i++)g.insertAdjacentHTML('beforeend',`<article class="item"><div class="head"><h3>${String(i).padStart(2,'0')} — ${N[i-1]}</h3><span>Front + Back</span></div><div class="pair"><div><div class="label">Front</div><div class="card front c${i}"><div class="mark">${logo}</div><div class="info"><div class="name">YASSER ABDUL KADIR</div><div class="role">Business Development Director</div><div class="small">SAC LOGISTICS</div></div><div class="info contact small">+966 5X XXX XXXX<br>yasser@sac-logistics.com<br>Jeddah, Saudi Arabia<br>sac-logistics.com</div></div></div><div><div class="label">Back</div><div class="card back c${i}">${backs[i-1]}</div></div></div></article>`);
function apply(k){const v=T[k];document.documentElement.style.setProperty('--a',v[1]);document.documentElement.style.setProperty('--b',v[2]);document.documentElement.style.setProperty('--n',v[3]);document.getElementById('sw').innerHTML=`<span style="background:${v[1]}"></span><span style="background:${v[2]}"></span><span style="background:${v[3]}"></span>`;sel.value=k;localStorage.setItem('sacCardTheme',k)}sel.onchange=e=>apply(e.target.value);apply(localStorage.getItem('sacCardTheme')||'industrial');
</script></body></html>
