<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SAC Logistics | Second Batch</title><style>:root{--a:#13c4e2;--b:#c5df31;--n:#061521}*{box-sizing:border-box}body{margin:0;background:#071827;color:#fff;font-family:Arial,sans-serif}.nav{position:sticky;top:0;z-index:5;display:flex;justify-content:center;gap:10px;padding:12px;background:#03101b;border-bottom:1px solid #ffffff22}.nav a{padding:11px 18px;border-radius:999px;border:1px solid #ffffff24;color:#dce8ef;text-decoration:none;font-size:12px;font-weight:800}.nav .on{color:#061521;background:linear-gradient(90deg,var(--a),var(--b));border:0}.wrap{width:min(1480px,calc(100% - 24px));margin:auto;padding:24px 0 40px}.hero,.item{background:#0a2132;border:1px solid #ffffff1a}.hero{padding:24px;border-radius:24px}.brand{display:flex;align-items:center;gap:14px}.logo{width:68px}.x{fill:var(--a)}.y{fill:var(--b)}.brand strong{font-size:22px;letter-spacing:2px}.brand small{display:block;color:#93a9ba;font-size:9px;letter-spacing:2px;margin-top:5px}.top{display:flex;justify-content:space-between;gap:24px;align-items:end;margin-top:22px}.top h1{margin:0;font-size:clamp(34px,5vw,64px)}.top p{max-width:520px;color:#9cb0c0}.tools{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}.control{padding:14px;border-radius:15px;border:1px solid #ffffff1a;background:#ffffff08}.control label{display:block;font-size:10px;font-weight:800;text-transform:uppercase;color:#bfd0dc;margin-bottom:8px}.control select{width:100%;padding:12px;border:0;border-radius:10px;font-weight:800}.sw{display:flex;gap:9px}.sw i{width:34px;height:34px;border-radius:9px;border:1px solid #ffffff30}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;margin-top:20px}.item{padding:15px;border-radius:20px}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.head h3{margin:0;font-size:17px}.head span,.label{font-size:9px;font-weight:800;text-transform:uppercase;color:#8fa5b6}.pair{display:grid;grid-template-columns:1fr 1fr;gap:12px}.label{margin-bottom:6px}.card{position:relative;overflow:hidden;aspect-ratio:1.75/1;border-radius:15px;background:#fff;color:#07131c}.mark{position:absolute;width:23%;left:7%;top:12%;z-index:2}.mark svg{width:100%}.info{position:absolute;z-index:2}.name{font-size:12px;font-weight:900}.role{font-size:8px;text-transform:uppercase}.small{font-size:7px;line-height:1.55}.front .info{left:7%;bottom:13%}.front .contact{left:auto;right:6%;text-align:right}.back .mark{left:50%;top:37%;width:27%;transform:translate(-50%,-50%)}.company,.tag,.web,.copy,.list{position:absolute;z-index:2;left:8%;right:8%;text-align:center}.company{bottom:25%;font-weight:900}.tag{bottom:16%;font-size:7px;text-transform:uppercase}.web{bottom:8%;font-size:7px}.copy{bottom:11%;font-size:8px;line-height:1.45}.list{bottom:11%;font-size:7px;line-height:1.55;text-align:left}.list b{display:block;font-size:9px}.c1{background:linear-gradient(135deg,#f5f7f8 0 58%,var(--n) 58%)}.c1:after{content:"";position:absolute;right:-12%;top:-20%;width:55%;height:145%;background:linear-gradient(140deg,var(--a),var(--b));clip-path:polygon(30% 0,100% 0,70% 100%,0 100%)}.c1 .contact{color:#fff}.c2{background:radial-gradient(circle at 15% 20%,var(--a),transparent 30%),radial-gradient(circle at 80% 80%,var(--b),transparent 30%),var(--n);color:#fff}.c3{background:#f3f1ec}.c3:before{content:"";position:absolute;inset:0 auto 0 0;width:38%;background:linear-gradient(var(--a),var(--b))}.c3 .info{left:45%}.c3 .contact{left:45%;right:auto}.c4{background:linear-gradient(120deg,#fff 0 67%,var(--n) 67%)}.c4 .contact{color:#fff}.c5{background:#0c1319;color:#fff;border-left:10px solid var(--a)}.c6{background:#fff}.c6:before{content:"";position:absolute;right:0;top:0;width:42%;height:100%;background:linear-gradient(160deg,var(--a),var(--b));clip-path:polygon(28% 0,100% 0,100% 100%,0 100%)}.c6 .contact{color:#fff}.c7 nst L='<svg viewBox="0 0 420 320"><path class="x" d="M24 103 132 12h264l-75 58H158l-33 31 119 27-71 61z"/><path class="y" d="m296 126 82 18-194 164-41-45z"/></svg>';const B=[`<div class="mark">${L}</div><div class="company">SAC LOGISTICS</div><div class="tag">Integrated Logistics Solutions</div><div class="web">www.sac-logistics.com</div>`,`<div class="mark">${L}</div><div class="copy">Moving equipment.<br>Connecting operations.<br>Delivering across Saudi Arabia.</div>`,`<div class="list"><b>Core Services</b>Equipment Supply<br>Road Transport<br>Warehouse Solutions<br>Operational Support</div>`,`<div class="mark">${L}</div><div class="copy">Scan to connect<br>Company profile<br>Service request</div>`,`<div class="list"><b>Built for demanding operations</b>Construction & Infrastructure<br>Factories & Industrial Sites<br>Warehouses & Distribution</div>`,`<div class="mark">${L}</div><div class="copy">Request → Assessment → Sourcing → Scheduling → Delivery</div>`,`<div class="mark">${L}</div><div class="company">SAC LOGISTICS</div><div class="tag">Jeddah • Saudi Arabia</div><div class="web">Equipment • Transport • Support</div>`,`<div class="list"><b>One partner. Clear responsibility.</b>Technical selection<br>Commercial comparison<br>Supply coordination</div>`,`<div class="mark">${L}</div><div class="copy">The right equipment.<br>The right specification.<br>The right delivery.</div>`,`<div class="mark">${L}</div><div class="tag" style="bottom:22%">Kingdom-wide logistics coverage</div><div class="web">sac-logistics.com</div>`];const s=document.getElementById('theme'),g=document.getElementById('grid');Object.entries(T).forEach(([k,v])=>s.innerHTML+=`<option value="${k}">${v[0]}</option>`);for(let i=1;i<=10;i++)g.innerHTML+=`<article class="item"><div class="head"><h3>${String(i).padStart(2,'0')} — ${N[i-1]}</h3><span>Front + Back</span></div><div class="pair"><div><div class="label">Front</div><div class="card front c${i}"><div class="mark">${L}</div><div class="info"><div class="name">YASSER ABDUL KADIR</div><div class="role">Business Development Director</div><div class="small">SAC LOGISTICS</div></div><div class="info contact small">+966 5X XXX XXXX<br>yasser@sac-logistics.com<br>Jeddah, Saudi Arabia<br>sac-logistics.com</div></div></div><div><div class="label">Back</div><div class="card back c${i}">${B[i-1]}</div></div></div></article>`;function apply(k){const v=T[k];document.documentElement.style.setProperty('--a',v[1]);document.documentElement.style.setProperty('--b',v[2]);document.documentElement.style.setProperty('--n',v[3]);document.getElementById('sw').innerHTML=`<i style="background:${v[1]}"></i><i style="background:${v[2]}"></i><i style="background:${v[3]}"></i>`;s.value=k}s.onchange=e=>apply(e.target.value);apply('industrial');</script></body></html>
